name: ruang_tenang_mobile
description: "Ruang Tenang - Platform Kesehatan Mental"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  flutter_html: ^3.0.0-beta.2

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # Dependency Injection
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Form & Validation
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.3.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4

  # Media
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.1

# App launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon_padded.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon_padded.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon_padded.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/moods/
    - assets/images/illustrations/
    - assets/images/onboarding/
    - assets/icons/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-VariableFont.ttf
